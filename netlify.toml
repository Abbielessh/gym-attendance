[build]
  command   = "npm install && npm run check"
  publish   = "public"
  functions = "netlify/functions"

[functions]
  node_bundler   = "esbuild"
  included_files = ["views/**", "public/**", "node_modules/ejs/**"]

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server/:splat"
  status = 200
